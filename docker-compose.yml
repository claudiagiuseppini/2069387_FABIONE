version: '3.8'

services:
  simulator:
    image: mars-iot-simulator:multiarch_v1
    ports:
      - "8080:8080"
    networks:
      - iot-network
    restart: always

  broker:
    image: apache/activemq-artemis:latest-alpine
    ports:
      - "61616:61616"
      - "1883:1883"
      - "61613:61613"
      - "8161:8161"
    environment:
      - ARTEMIS_USER=admin
      - ARTEMIS_PASSWORD=admin_password
      - ANONYMOUS_LOGIN=true
    networks:
      - iot-network

  ingestion-service:
    build: ./ingestion
    depends_on:
      - simulator
      - broker
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - iot-network

  processing:
    build: ./processing
    container_name: processing_service
    depends_on:
      - broker
      - db
      - simulator
    networks:
      - iot-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - broker
      - db
      - simulator
    networks:
      - iot-network

  db:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mars_iot
      MYSQL_USER: user_mars
      MYSQL_PASSWORD: password_mars
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/data:/var/lib/mysql
    networks:
      - iot-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge