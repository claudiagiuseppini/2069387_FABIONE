version: '3.8'

services:
  simulator:
    image: mars-iot-simulator:multiarch_v1
    container_name: simulator
    ports:
      - "8080:8080"
    networks:
      - iot-network
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  broker:
    image: apache/activemq-artemis:latest-alpine
    container_name: broker
    ports:
      - "61616:61616"
      - "1883:1883"
      - "61613:61613"
      - "8161:8161"
    environment:
      - ARTEMIS_USER=admin
      - ARTEMIS_PASSWORD=admin_password
      - ANONYMOUS_LOGIN=true
    networks:
      - iot-network
    healthcheck:
      # Controlla che la porta STOMP sia aperta e accetti connessioni
      test: ["CMD", "nc", "-z", "localhost", "61613"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-service:
    build: ./ingestion
    container_name: ingestion_service
    depends_on:
      - simulator
      - broker
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - iot-network

  processing_service:
    build: ./processing
    container_name: processing_service
    depends_on:
      - broker
      - db
      - simulator
    networks:
      - iot-network

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - broker
      - db
      - simulator
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  db:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mars_iot
      MYSQL_USER: user_mars
      MYSQL_PASSWORD: password_mars
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/data:/var/lib/mysql
    networks:
      - iot-network
    healthcheck:
      # Usiamo il client nativo per verificare che il server risponda
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "user_mars", "-ppassword_mars"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge